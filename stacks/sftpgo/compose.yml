services:
  sftpgo:
    image: registry.sftpgo.com/sftpgo/sftpgo:v2.7.20260307
    container_name: sftpgo
    user: 1000:1000
    ports:
      - 8083:8080
      - 2022:2022
    volumes:
      - ${STORAGE}/sftpgo_data:/srv/sftpgo 
      - sftpgo_config:/var/lib/sftpgo
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sftpgo.rule=Host(`sftpgo.omp.home`)"
      - "traefik.http.routers.sftpgo.entrypoints=web"
      - "traefik.http.services.sftpgo.loadbalancer.server.port=8080"

volumes:
  sftpgo_config:
    external: true

networks:
  traefik-net:
    external: true