services:
  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ${STORAGE}/downloads:/downloads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`metube.omp.home`)"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
